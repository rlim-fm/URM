[pytest]
testpaths = tests
markers =
    slow: end-to-end tests (full model forward passes, multi-step training loops)
    needs_flash_attn: requires the flash_attn package
    needs_numba: requires the numba package
    needs_hydra: requires hydra/omegaconf (pretrain.py CLI path)
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
